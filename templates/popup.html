<div class="popup-card" style="font-family: Arial, sans-serif; font-size: 14px; line-height: 1.5; min-width: 240px;">
  <div class="popup-header" style="margin-bottom: 8px;">
    <div class="popup-title" style="font-size: 16px; font-weight: bold;">{name}</div>
    <div class="popup-type" style="color: #555;">{type}</div>
  </div>

  <div class="popup-section" style="margin-bottom: 8px;">
    <div><strong>Address:</strong> {address}</div>
    <div><strong>Phone:</strong> {phone}</div>
    <div><strong>Website:</strong> {website_html}</div>
  </div>

  <div class="popup-section" style="margin-bottom: 8px;">
    <div><strong>Hours:</strong> {hours}</div>
    <div><strong>Transport:</strong> {transport}</div>
    <div><strong>Notes:</strong> {notes}</div>
  </div>

  <div class="popup-footer" style="font-size: 12px; color: #666; border-top: 1px solid #ddd; padding-top: 6px;">
    {source}
  </div>
</div>
